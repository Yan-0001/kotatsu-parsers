name: Build & Publish Private

on:
    workflow_dispatch:

env:
    D8_PATH: build/libs/plugin.jar

permissions:
    contents: write

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repository 🌏
                uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
                with:
                    fetch-depth: 0

            -   name: Fetch latest commit 🔖
                id: meta
                run: echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

            -   name: Set up Java environment 🔧
                uses: actions/setup-java@b622de1dfa918ecc0ab28f40cd42e3c3752cd6c5
                with:
                    java-version: '17'
                    distribution: 'temurin'

            -   name: Set up Gradle environment 📦
                uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e
                with:
                    gradle-version: '9.3.1'

            -   name: Setup Android SDK 🚀
                uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699

            -   name: Run assemble tasks 🚀
                run: ./gradlew assemble --rerun-tasks

            -   name: Process library with d8 🚀
                env:
                    LIB_PATH: build/libs/kotatsu-parsers.jar
                run: |
                    if [ -f ${{ env.LIB_PATH }} ]; then
                        d8 --release ${{ env.LIB_PATH }} --output ${{ env.D8_PATH }}
                    else
                        echo "ℹ️ Pre-compiled library not found, skipping D8 step..."
                    fi
                continue-on-error: true

            -   name: Upload artifacts 🌐
                uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
                with:
                    tag_name: ${{ steps.meta.outputs.sha_short }}
                    name: ${{ steps.meta.outputs.sha_short }}
                    body: |
                        Built from commit [`${{ steps.meta.outputs.sha_short }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
                    files: ${{ env.D8_PATH }}
                env:
                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}